name: Generate and Upload Documents

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: sudo ./dependencies.sh

      - name: Generate Documents
        run: ./make-documents.sh

      - name: Upload artifacts (PDF)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: purpura.pdf
          path: purpura.pdf
          archive: false
          retention-days: 15
          
      - name: Upload artifacts (ePub)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: purpura.epub
          path: purpura.epub
          archive: false
          retention-days: 15
